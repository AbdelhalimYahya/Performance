# docker-compose.monitoring.yml
#
# Local observability stack for development.
# Run: docker-compose -f docker-compose.monitoring.yml up -d
#
# Services:
#   - Prometheus:  http://localhost:9090 (metrics UI)
#   - Grafana:     http://localhost:3001 (dashboards, login: admin/admin)
#   - Jaeger:      http://localhost:16686 (trace UI)

version: '3.8'

services:
  # ─── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: perf-prometheus
    ports:
      - '9090:9090'
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.2
    container_name: perf-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── Jaeger ────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: perf-jaeger
    ports:
      - '16686:16686'   # Jaeger UI
      - '4317:4317'     # OTLP gRPC receiver
      - '4318:4318'     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    volumes:
      - jaeger-data:/badger
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  jaeger-data:
